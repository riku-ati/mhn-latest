<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Modern Honey Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:block;">
  <div class="auth-page">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:28px;">
        <span style="font-size:32px;color:var(--accent-green);">⬡</span>
        <div class="auth-title" style="margin-top:8px;">Reset Password</div>
        <div class="auth-subtitle">
          {% if reset_user %}
            Setting new password for <span class="mono">{{ reset_user.email }}</span>
          {% else %}
            Enter your new password below
          {% endif %}
        </div>
      </div>

      <div id="pass-alert" class="alert" style="display:none;"></div>

      <form id="pass-form" action="{{ url_for('auth.change_passwd', user_id=reset_user.id) }}" method="post">
        <input id="_csrf_token" name="_csrf_token" type="hidden" value="{{ csrf_token() }}">
        <input id="email-edit" name="email" type="hidden" value="{{ reset_user.email }}" />
        <input id="hashstr-edit" name="hashstr" type="hidden" value="{{ hashstr }}" />

        <div class="form-group">
          <label for="password-edit">New Password</label>
          <input id="password-edit" name="password" type="password" placeholder="Enter new password..." autocomplete="new-password" required />
        </div>

        <div class="form-group">
          <label for="password-repeat-edit">Confirm Password</label>
          <input id="password-repeat-edit" name="password-repeat" type="password" placeholder="Repeat new password..." autocomplete="new-password" required />
        </div>

        <button id="submit-pass" type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
          Reset Password
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;">
        <a href="{{ url_for('auth.login_user') }}" style="font-size:12px;color:var(--text-muted);">← Back to Login</a>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
