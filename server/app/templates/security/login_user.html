<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Modern Honey Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:block;">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-logo-icon">⬡</span>
        <span class="login-logo-text">MHN<span class="login-logo-accent">latest</span></span>
        <span class="login-subtitle">Modern Honey Network</span>
      </div>

      <div id="login-error" class="alert alert-danger" style="display:none;"></div>

      <form id="login-form" action="" method="post">
        <input id="_csrf_token" name="_csrf_token" type="hidden" value="{{ csrf_token() }}">

        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" placeholder="admin@example.com" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="passwd">Password</label>
          <input id="passwd" name="passwd" type="password" placeholder="••••••••••••" autocomplete="current-password" required />
        </div>

        <button id="log-btn" type="submit" class="btn btn-primary w-full" style="width:100%;justify-content:center;margin-top:8px;">
          Connect
        </button>

        <a href="{{ url_for('ui.reset_passwd') }}" class="login-forgot" style="text-align:center;">
          Forgot password?
        </a>
      </form>

      <div class="login-status">// INITIALIZING SECURE CONNECTION...</div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
