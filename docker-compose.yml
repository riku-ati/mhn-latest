services:
  mhn:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-sqlite:////app/db/mhn.db}
      - MONGODB_HOST=${MONGODB_HOST:-mongodb}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEPLOY_KEY=${DEPLOY_KEY}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8080}
    volumes:
      - ./server/logs:/var/log/mhn
      - mhn_db:/app/db
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  hpfeeds-broker:
    build: .
    command: >
      python -m hpfeeds.scripts.broker
      --bind 0.0.0.0:10000
      --auth mongodb://${MONGODB_HOST:-mongodb}:${MONGODB_PORT:-27017}/hpfeeds
    ports:
      - "10000:10000"
    environment:
      - MONGODB_HOST=${MONGODB_HOST:-mongodb}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
    depends_on:
      - mongodb
    restart: unless-stopped

  mnemosyne:
    build: .
    command: python mnemosyne.py
    environment:
      - MONGODB_HOST=${MONGODB_HOST:-mongodb}
      - MONGODB_PORT=${MONGODB_PORT:-27017}
      - HPF_HOST=hpfeeds-broker
      - HPF_PORT=10000
      - HPF_IDENT=mnemosyne
      - HPF_SECRET=${MNEMOSYNE_SECRET:-mnemosyne-secret}
    depends_on:
      - hpfeeds-broker
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery:
    build: .
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-sqlite:////app/db/mhn.db}
      - MONGODB_HOST=${MONGODB_HOST:-mongodb}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DEPLOY_KEY=${DEPLOY_KEY}
    volumes:
      - mhn_db:/app/db
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

volumes:
  mongo_data:
  mhn_db:
